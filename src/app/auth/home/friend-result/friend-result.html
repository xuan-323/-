<div class="page">

  <h1 class="title">找飯友 🍻</h1>

  <!-- 載入中 -->
  <p class="subtitle" *ngIf="!restaurant">
    正在幫你找適合的餐廳…
  </p>

  <!-- 餐廳卡片 -->
  <div
    class="card"
    *ngIf="restaurant"
    [class.selected]="selected"
    (click)="selectCard()"
  >
    <img [src]="restaurant.image" alt="restaurant" />

    <div class="card-body">
      <h3>{{ restaurant.name }}</h3>
      <p class="distance">{{ restaurant.distance }} km</p>

      <div class="tags">
        <span *ngFor="let t of restaurant.tags">
          #{{ t }}
        </span>
      </div>
    </div>
  </div>

  <!-- 按鈕區 -->
  <div class="actions">
    <button class="btn ghost" (click)="shuffle()">
      🔄 換一換
    </button>

    <button
      class="btn primary"
      [disabled]="!selected"
      (click)="confirm()"
    >
      ✅ 確定
    </button>
  </div>

  <p class="hint">
    正在為你配對一起吃飯的夥伴中…
  </p>

</div>
