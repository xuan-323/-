<div class="matching-container">

  <!-- 等待配對 -->
  <div *ngIf="candidates.length === 0" class="waiting">

    <h2>🍜 食伴 Match</h2>

    <p>正在幫你找適合的飯友...</p>

    <div class="loader"></div>

  </div>


  <!-- 配對成功 -->
  <div *ngIf="candidates.length > 0">

    <div *ngFor="let friend of candidates" class="card">

      <img [src]="friend.avatar" class="avatar">

      <h3>{{ friend.name }}</h3>

      <p class="mbti">{{ friend.mbti }}</p>

      <p class="intro">{{ friend.intro }}</p>

      <div class="buttons">

        <button class="like" (click)="likeFriend(friend)">
          一起吃 🍜
        </button>

        <button class="chat" (click)="goToChat(friend)">
          開始聊天 💬
        </button>

      </div>

    </div>

  </div>

</div>
