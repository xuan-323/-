<div class="page">

  <h1 class="finish-title">今天就吃這間吧！</h1>

  <!-- 防呆：如果沒有資料 -->
  <p class="hint" *ngIf="!restaurant">
    ⚠️ 沒有接收到餐廳資料
  </p>

  <!-- 有餐廳資料才顯示 -->
  <div class="card" *ngIf="restaurant">

    <img
      class="card-img"
      [src]="restaurant.image"
      [alt]="restaurant.name"
    />

    <h2 class="card-name">
      {{ restaurant.name }}
    </h2>

    <p class="card-tags">
      {{ restaurant.tags.join('、') }}
    </p>

    <p class="card-distance">
      距離你 {{ restaurant.distance }} km
    </p>

  </div>

  <!-- 按鈕區 -->
  <div class="actions">
    <button class="btn primary" (click)="openMap()">
      📍 開啟地圖
    </button>

    <button class="btn secondary" (click)="goBack()">
      再選一次
    </button>
  </div>

</div>
