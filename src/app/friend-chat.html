<div class="chat-page">

  <!-- 上方資訊 -->
  <div class="topbar">

    <div class="left">

      <img
        class="avatar"
        [src]="friend?.avatar || 'https://i.pravatar.cc/100'"
      />

      <div>

        <div class="name">
          {{friend?.name || '匿名使用者'}}
        </div>

        <div class="mbti">
          {{friend?.mbti || '未知'}}
        </div>

      </div>

    </div>

  </div>


  <!-- 聊天訊息 -->
  <div class="chat-body" #chatBox>

    <div *ngFor="let msg of messages">

      <!-- 我 -->
      <div
        *ngIf="msg.sender_id === userId"
        class="bubble me"
      >

        {{msg.message}}

        <div class="time">

          {{msg.created_at | date:'HH:mm'}}

          <span class="read">
            {{msg.is_read ? '✓✓':'✓'}}
          </span>

        </div>

      </div>


      <!-- 對方 -->
      <div
        *ngIf="msg.sender_id !== userId"
        class="bubble friend"
      >

        {{msg.message}}

        <div class="time">
          {{msg.created_at | date:'HH:mm'}}
        </div>

      </div>

    </div>


    <!-- typing -->
    <div *ngIf="typing" class="bubble friend typing">

      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

  </div>


  <!-- 輸入 -->
  <div class="chat-input">

    <input
      [(ngModel)]="newMessage"
      placeholder="輸入訊息..."
      (input)="onTyping()"
    />

    <button (click)="sendMessage()">
      發送
    </button>

  </div>

</div>
